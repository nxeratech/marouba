<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marouba</title>
  </head>
  <body>
    <main>
      <section class="status">
        <span id="dot"></span>
        <div>
          <p id="mode">idle</p>
          <h1 id="window">No active window yet</h1>
        </div>
      </section>
      <section class="controls">
        <button id="record" class="record">Record</button>
        <button id="stop" class="stop" disabled>Stop</button>
        <button id="open-vault" class="secondary">Open Vault</button>
      </section>
      <section id="vault-drawer" class="vault-drawer" hidden>
        <div class="vault-card">
          <div class="panel-head">
            <h2>Vault</h2>
            <div class="vault-tools">
              <button id="refresh-workflows" class="icon-button" title="Refresh workflows">Refresh</button>
              <button id="close-vault" class="icon-button" title="Close vault">Close</button>
            </div>
          </div>
          <div id="workflow-list" class="workflow-list"></div>
          <div id="workflow-actions" class="workflow-actions" hidden>
            <button id="replay-workflow">Replay</button>
            <button id="delete-workflow" class="danger">Delete</button>
          </div>
          <p id="replay-status" hidden></p>
        </div>
      </section>
      <section class="panel">
        <h2>Last actions</h2>
        <ol id="actions"></ol>
      </section>
      <section id="review" class="panel" hidden>
        <h2>Review capture</h2>
        <input id="workflow-name" placeholder="Workflow name *" required />
        <p id="name-hint" hidden>Please enter a workflow name</p>
        <div id="steps"></div>
        <button id="save" aria-disabled="true">Save Workflow</button>
      </section>
      <p id="message"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
