adapter: fusion360
mechanism: python-api-design-timeline
tier: T1
versions: ["2024", "2025", "2026", "latest"]
capabilities:
  design_timeline: full
  sketches: full_when_api_parameters_captured
  profiles: full
  extrudes: full
  fillets: full
  user_parameters: full
known_blockers:
