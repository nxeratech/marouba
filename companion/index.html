<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marouba Companion</title>
  </head>
  <body>
    <main>
      <section class="status">
        <span id="dot"></span>
        <div>
          <p id="mode">idle</p>
          <h1 id="window">No active window yet</h1>
        </div>
      </section>
      <section class="controls">
        <button id="record">Record</button>
        <button id="stop" class="secondary">Stop</button>
        <button id="open-vault" class="secondary">Open Vault</button>
      </section>
      <section class="panel">
        <h2>Last actions</h2>
        <ol id="actions"></ol>
      </section>
      <section id="review" class="panel" hidden>
        <h2>Review capture</h2>
        <input id="workflow-name" placeholder="Workflow name" />
        <div id="steps"></div>
        <button id="save">Save Workflow</button>
      </section>
      <p id="message"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
